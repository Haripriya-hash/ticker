spring.application.name=ticker

# --- Database (set these via environment variables in production) ---
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ticker}
spring.datasource.username=${DATABASE_USERNAME:ticker}
spring.datasource.password=${DATABASE_PASSWORD:ticker}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- Finnhub API ---
finnhub.api-key=${FINNHUB_API_KEY:}

server.port=${PORT:8080}
