<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change password · Ticker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="ticker-banner">
    <div class="ticker-track">
        <span class="up">AAPL 214.32 &#9650;</span>
        <span class="down">TSLA 178.05 &#9660;</span>
        <span class="up">MSFT 441.10 &#9650;</span>
        <span class="up">NVDA 129.87 &#9650;</span>
        <span class="down">AMZN 198.44 &#9660;</span>
        <span class="up">GOOGL 172.63 &#9650;</span>
        <span class="up">AAPL 214.32 &#9650;</span>
        <span class="down">TSLA 178.05 &#9660;</span>
        <span class="up">MSFT 441.10 &#9650;</span>
        <span class="up">NVDA 129.87 &#9650;</span>
        <span class="down">AMZN 198.44 &#9660;</span>
        <span class="up">GOOGL 172.63 &#9650;</span>
    </div>
</div>

<div class="page">
    <div class="dashboard-header">
        <div class="brand" style="margin-bottom:0;">ticker<span>.</span></div>
        <div style="display:flex; align-items:center; gap:1.25rem;">
            <a th:href="@{/dashboard}" style="font-size:0.85rem; color:var(--ink-soft); text-decoration:none; font-weight:600;">&larr; Back to dashboard</a>
            <form class="logout-form" th:action="@{/logout}" method="post">
                <button type="submit">Log out</button>
            </form>
        </div>
    </div>

    <div class="card">
        <h1>Change your password</h1>
        <p class="subtitle">Enter your current password and choose a new one.</p>

        <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <form th:action="@{/change-password}" th:object="${changePasswordForm}" method="post">
            <div class="field">
                <label for="currentPassword">Current password</label>
                <input type="password" id="currentPassword" th:field="*{currentPassword}" autocomplete="current-password" autofocus>
                <div class="field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
            </div>
            <div class="field">
                <label for="newPassword">New password</label>
                <input type="password" id="newPassword" th:field="*{newPassword}" autocomplete="new-password">
                <div class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
            </div>
            <div class="field">
                <label for="confirmPassword">Confirm new password</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" autocomplete="new-password">
                <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>
            <button type="submit" class="btn">Update password</button>
        </form>
    </div>
</div>

</body>
</html>
