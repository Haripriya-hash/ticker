<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up · Ticker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="ticker-banner">
    <div class="ticker-track">
        <span class="up">AAPL 214.32 &#9650;</span>
        <span class="down">TSLA 178.05 &#9660;</span>
        <span class="up">MSFT 441.10 &#9650;</span>
        <span class="up">NVDA 129.87 &#9650;</span>
        <span class="down">AMZN 198.44 &#9660;</span>
        <span class="up">GOOGL 172.63 &#9650;</span>
        <span class="up">AAPL 214.32 &#9650;</span>
        <span class="down">TSLA 178.05 &#9660;</span>
        <span class="up">MSFT 441.10 &#9650;</span>
        <span class="up">NVDA 129.87 &#9650;</span>
        <span class="down">AMZN 198.44 &#9660;</span>
        <span class="up">GOOGL 172.63 &#9650;</span>
    </div>
</div>

<div class="page">
    <div class="brand">ticker<span>.</span></div>

    <div class="card">
        <h1>Create your account</h1>
        <p class="subtitle">Sign up to start looking up stock prices.</p>

        <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form th:action="@{/signup}" th:object="${signupForm}" method="post">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}" autocomplete="username" autofocus>
                <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" autocomplete="new-password">
                <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            <button type="submit" class="btn">Create account</button>
        </form>

        <div class="form-footer">
            Already have an account? <a th:href="@{/login}">Log in</a>
        </div>
    </div>
</div>

</body>
</html>
